spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:taskflow}
    username: ${POSTGRES_USER:taskflow}
    password: ${POSTGRES_PASSWORD}          # required — no default, fail fast if missing
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns schema, NOT Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  shutdown: graceful
  port: 8080

spring.lifecycle.timeout-per-shutdown-phase: 30s

app:
  jwt:
    secret: ${JWT_SECRET}                   # required — no default, fail fast if missing
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  bcrypt:
    strength: ${BCRYPT_STRENGTH:12}